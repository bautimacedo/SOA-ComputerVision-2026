server {
    listen 80;
    server_name soagmr.mooo.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name soagmr.mooo.com;

    ssl_certificate     /etc/letsencrypt/live/soagmr.mooo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/soagmr.mooo.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}

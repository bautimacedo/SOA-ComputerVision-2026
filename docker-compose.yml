services:
  app:
    build: .
    container_name: soa_app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    depends_on:
      db:
        condition: service_healthy
    networks:
      - soa_net

  db:
    image: pgvector/pgvector:pg16
    container_name: soa_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: soa
      POSTGRES_PASSWORD: soa
      POSTGRES_DB: soatp
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soa -d soatp"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - soa_net

  nginx:
    image: nginx:alpine
    container_name: soa_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - soa_net

volumes:
  pgdata:

networks:
  soa_net:
    driver: bridge
